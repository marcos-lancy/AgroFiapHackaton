apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: agrosolutions-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'identity-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['identity-service.agrosolutions-app.svc.cluster.local:8080']

      - job_name: 'properties-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['properties-service.agrosolutions-app.svc.cluster.local:8080']

      - job_name: 'ingestion-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['ingestion-service.agrosolutions-app.svc.cluster.local:8080']

      - job_name: 'analytics-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['analytics-service.agrosolutions-app.svc.cluster.local:8080']

