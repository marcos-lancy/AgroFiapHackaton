apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: agrosolutions-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard
          image: agrosolutions/dashboard-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: agrosolutions-app
spec:
  selector:
    app: dashboard-service
  ports:
    - name: http
      port: 80
      targetPort: 80
