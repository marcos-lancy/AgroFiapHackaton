name: ci-cd-k8s

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: identity-service
            context: AgroSolutionsIdentity
            dockerfile: AgroSolutionsIdentity/Dockerfile
            image: agrosolutions-identity-service
          - name: properties-service
            context: AgroSolutionsProperties
            dockerfile: AgroSolutionsProperties/Dockerfile
            image: agrosolutions-properties-service
          - name: ingestion-service
            context: AgroSolutionsIngestion
            dockerfile: AgroSolutionsIngestion/Dockerfile
            image: agrosolutions-ingestion-service
          - name: analytics-service
            context: AgroSolutionAnalytics
            dockerfile: AgroSolutionAnalytics/Dockerfile
            image: agrosolutions-analytics-service
          - name: analytics-worker
            context: AgroSolutionAnalytics
            dockerfile: AgroSolutionAnalytics/Dockerfile.Worker
            image: agrosolutions-analytics-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config

      - name: Apply manifests
        run: kubectl apply -k infra/k8s

      - name: Normalize owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Update app images
        run: |
          kubectl -n agrosolutions-app set image deployment/identity-service identity-service=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/agrosolutions-identity-service:${{ github.sha }}
          kubectl -n agrosolutions-app set image deployment/properties-service properties-service=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/agrosolutions-properties-service:${{ github.sha }}
          kubectl -n agrosolutions-app set image deployment/ingestion-service ingestion-service=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/agrosolutions-ingestion-service:${{ github.sha }}
          kubectl -n agrosolutions-app set image deployment/analytics-service analytics-service=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/agrosolutions-analytics-service:${{ github.sha }}
          kubectl -n agrosolutions-app set image deployment/analytics-worker analytics-worker=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/agrosolutions-analytics-worker:${{ github.sha }}

      - name: Wait rollouts
        run: |
          kubectl -n agrosolutions-app rollout status deployment/identity-service --timeout=180s
          kubectl -n agrosolutions-app rollout status deployment/properties-service --timeout=180s
          kubectl -n agrosolutions-app rollout status deployment/ingestion-service --timeout=180s
          kubectl -n agrosolutions-app rollout status deployment/analytics-service --timeout=180s
          kubectl -n agrosolutions-app rollout status deployment/analytics-worker --timeout=180s

